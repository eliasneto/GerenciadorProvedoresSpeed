services:
  speed_db:
    image: mysql:8.0
    container_name: speed_mysql_homolog
    restart: always
    environment:
      - TZ=America/Fortaleza
      - MYSQL_DATABASE=speed_banco
      - MYSQL_USER=speed_user
      - MYSQL_PASSWORD=speed_password
      - MYSQL_ROOT_PASSWORD=root_super_password
    ports:
      - "3304:3306"
    volumes:
      - speed_db_data_homolog:/var/lib/mysql

  speed_web:
    build: .
    container_name: speed_sistema_homolog
    restart: always
    ports:
      - "8091:8000"
    environment:
      - TZ=America/Fortaleza
      - TIME_ZONE=America/Fortaleza
      - DB_NAME=speed_banco
      - DB_USER=speed_user
      - DB_PASSWORD=speed_password
      - DB_HOST=speed_db
      - DB_PORT=3306
      - USE_AD_AUTH=true
      - AD_SERVER_URI=ldap://192.168.90.51
      - AD_BIND_DN=servico.ti@howbe.local
      - AD_BIND_PASSWORD=HowB3@dm1n
      - AD_USER_SEARCH_BASE=DC=howbe,DC=local
      - AD_GROUP_SEARCH_BASE=DC=howbe,DC=local
      - AD_DEFAULT_DOMAIN=HOWBE
    extra_hosts:
      - "howbe.local:192.168.90.51"
    volumes:
      - ./media:/app/media
    command: >
      sh -c "mkdir -p /app/media && 
             chmod -R 777 /app/media && 
             python setup_speed.py && 
             gunicorn --bind 0.0.0.0:8000 --timeout 300 --workers 3 --log-level debug --access-logfile - config.wsgi:application"
    depends_on:
      - speed_db

  speed_sincronizador:
    build: .
    container_name: speed_sincronizador_ixc_homolog
    restart: always
    environment:
      - TZ=America/Fortaleza
      - TIME_ZONE=America/Fortaleza
      - USE_AD_AUTH=false
      - DB_NAME=speed_banco
      - DB_USER=speed_user
      - DB_PASSWORD=speed_password
      - DB_HOST=speed_db
      - DB_PORT=3306
    depends_on:
      - speed_db
    command: >
      sh -c "
      echo ' Aguardando banco de dados estabilizar...';
      sleep 25;
      
      # Inicializa os marcadores
      ULTIMA_DATA_TOTAL='0';
      ULTIMA_FAXINA=0;
      
      while true; do
        HORA_AGORA=$$(date +%H);
        DATA_HOJE=$$(date +%Y%m%d);
        AGORA_SEC=$$(date +%s);
        
        # 1. INCREMENTAL (A cada 1 hora)
        echo ' ['$$(date +%H:%M)'] Iniciando sincronização incremental...';
        python scripts/integracoes/ixc_api_incremental.py;

        # 2. CARGA TOTAL (Roda apenas às 23h se não rodou hoje)
        if [ \"$$HORA_AGORA\" -eq \"23\" ] && [ \"$$DATA_HOJE\" != \"$$ULTIMA_DATA_TOTAL\" ]; then
          echo ' ['$$(date +%H:%M)'] Iniciando Carga Total Programada (23h)...';
          python scripts/integracoes/ixc_api.py;
          ULTIMA_DATA_TOTAL=$$DATA_HOJE;
        fi

        # 3. FAXINA/LIXO (A cada 24 horas)
        DIFERENCA_FAXINA=$$((AGORA_SEC - ULTIMA_FAXINA));
        if [ $$DIFERENCA_FAXINA -ge 86400 ]; then
          echo '🧹 ['$$(date +%H:%M)'] Iniciando Faxina Diária...';
          python scripts/integracoes/ixc_faxina.py;
          ULTIMA_FAXINA=$$AGORA_SEC;
        fi

        echo ' Ciclo finalizado. Próximo incremental em 5 minutos...';
        sleep 3600;
      done"

  speed_backup:
    image: ubuntu:22.04
    container_name: speed_backup_diario_homolog
    restart: always
    depends_on:
      - speed_db
    environment:
      - TZ=America/Fortaleza
    volumes:
      - ./media:/app/media
      - backup_windows_homolog:/mnt/windows
    command: >
      sh -c "
      echo 'Configurando ferramentas de backup...';
      apt-get update && apt-get install -y mysql-client zip tzdata;
      
      echo 'Serviço de backup iniciado. Aguardando 02h00 da manhã...';
      while true; do
        HORA=$$(date +%H);
        MINUTO=$$(date +%M);
        
        # Roda todo dia exatamente às 02h00
        if [ \"$$HORA\" = \"02\" ] && [ \"$$MINUTO\" = \"00\" ]; then
          DATA=$$(date +%Y-%m-%d_%H-%M);
          echo \"[$$DATA] Iniciando backup automático...\";
          
          # 1. Extrai o banco usando ROOT e desabilitando tablespaces
          mysqldump -h speed_db -u root -proot_super_password --no-tablespaces speed_banco > /tmp/banco_$$DATA.sql;
          
          # 2. Compacta LOCALMENTE no Linux primeiro (Evita arquivo de 0 KB na rede)
          zip -r /tmp/backup_speed_$$DATA.zip /app/media /tmp/banco_$$DATA.sql > /dev/null;
          
          # 3. Copia o arquivo pronto para o Windows
          cp /tmp/backup_speed_$$DATA.zip /mnt/windows/;
          
          # 4. Limpa todo o lixo local do Linux
          rm /tmp/banco_$$DATA.sql /tmp/backup_speed_$$DATA.zip;
          
          # 5. Faxina: Apaga backups com mais de 10 dias do Windows
          find /mnt/windows -name 'backup_speed_*.zip' -mtime +10 -delete;
          
          echo \"[$$DATA] Backup finalizado e salvo no Windows com sucesso!\";
          sleep 60; # Dorme 1 minuto para não correr o risco de rodar duas vezes
        fi;
        sleep 30; # Checa a hora a cada 30 segundos
      done"

volumes:
  speed_db_data_homolog:
  
  backup_windows_homolog:
    driver_opts:
      type: cifs
      o: "username=elias.neto,password=Gustavo@1027,domain=HOWBE,vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777"
      device: "//192.168.90.53/Publica/Elias_Homolog"