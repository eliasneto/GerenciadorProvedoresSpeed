services:
  speed_db:
    image: mysql:8.0
    container_name: speed_mysql
    init: true
    restart: always
    environment:
      - TZ=America/Fortaleza
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3304:3306"
    volumes:
      - speed_db_data:/var/lib/mysql

  speed_web:
    build: .
    container_name: speed_sistema
    init: true
    restart: always
    ports:
      - "8091:8000"
    environment:
      - TZ=America/Fortaleza
      - TIME_ZONE=America/Fortaleza
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_STARTUP_TIMEOUT=${DB_STARTUP_TIMEOUT}
      - USE_AD_AUTH=${USE_AD_AUTH}
      - AD_SERVER_URI=${AD_SERVER_URI}
      - AD_BIND_DN=${AD_BIND_DN}
      - AD_BIND_PASSWORD=${AD_BIND_PASSWORD}
      - AD_USER_SEARCH_BASE=${AD_USER_SEARCH_BASE}
      - AD_GROUP_SEARCH_BASE=${AD_GROUP_SEARCH_BASE}
      - AD_DEFAULT_DOMAIN=${AD_DEFAULT_DOMAIN}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    extra_hosts:
      - "howbe.local:192.168.90.51"
    volumes:
      - ./media:/app/media
    command: >
      sh -c "mkdir -p /app/media && 
             chmod -R 777 /app/media && 
             python setup_speed.py && 
             gunicorn --bind 0.0.0.0:8000 --timeout 1200 --workers 3 --log-level debug --access-logfile - config.wsgi:application"
    depends_on:
      - speed_db

  speed_sincronizador:
    build: .
    container_name: speed_sincronizador_ixc
    init: true
    restart: always
    environment:
      - TZ=America/Fortaleza
      - TIME_ZONE=America/Fortaleza
      - USE_AD_AUTH=false
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    depends_on:
      - speed_db
    command: >
      sh -c "
      echo ' Aguardando banco de dados estabilizar...';
      sleep 25;
      
      # Inicializa os marcadores
      ULTIMA_DATA_TOTAL='0';
      ULTIMA_DATA_OS_LASTMILE='0';
      ULTIMA_FAXINA=0;
      
      while true; do
        HORA_AGORA=$$(date +%H);
        DATA_HOJE=$$(date +%Y%m%d);
        AGORA_SEC=$$(date +%s);
        
        # 1. INCREMENTAL (A cada 5 minutos)
        echo ' ['$$(date +%H:%M)'] Iniciando sincronização incremental...';
        python scripts/integracoes/ixc_api_incremental.py;

        # 2. CARGA TOTAL (Roda 1x por dia a partir das 02h, se ainda nao rodou)
        if [ \"$$HORA_AGORA\" -ge \"02\" ] && [ \"$$DATA_HOJE\" != \"$$ULTIMA_DATA_TOTAL\" ]; then
          echo ' ['$$(date +%H:%M)'] Iniciando Carga Total Programada (02h)...';
          python scripts/integracoes/ixc_api.py;
          ULTIMA_DATA_TOTAL=$$DATA_HOJE;
        fi

        # 2.1. OS COMERCIAL | LASTMILE (Roda 1x por dia a partir das 23h)
        if [ \"$$HORA_AGORA\" -ge \"23\" ] && [ \"$$DATA_HOJE\" != \"$$ULTIMA_DATA_OS_LASTMILE\" ]; then
          echo ' ['$$(date +%H:%M)'] Iniciando atualizacao diaria de OS Comercial | Lastmile (ultimos 10 dias)...';
          python scripts/integracoes/ixc_os_comercial_lastmile.py --os-alterada-nos-ultimos-dias=10;
          ULTIMA_DATA_OS_LASTMILE=$$DATA_HOJE;
        fi

        # 3. FAXINA/LIXO (A cada 24 horas)
        DIFERENCA_FAXINA=$$((AGORA_SEC - ULTIMA_FAXINA));
        if [ $$DIFERENCA_FAXINA -ge 86400 ]; then
          echo '🧹 ['$$(date +%H:%M)'] Iniciando Faxina Diária...';
          python scripts/integracoes/ixc_faxina.py;
          ULTIMA_FAXINA=$$AGORA_SEC;
        fi

        echo ' Ciclo finalizado. Próximo incremental em 5 minutos...';
        sleep 300;
      done"

  speed_backup:
    image: ubuntu:22.04
    container_name: speed_backup_diario
    profiles:
      - backup
    init: true
    restart: always
    depends_on:
      - speed_db
    environment:
      - TZ=America/Fortaleza
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - BACKUP_WINDOWS_SUBDIR=${BACKUP_WINDOWS_SUBDIR}
    volumes:
      - ./media:/app/media
      - backup_windows:/mnt/windows
    command: >
      sh -c "
      echo 'Configurando ferramentas de backup...';
      apt-get update && apt-get install -y mysql-client zip tzdata;
      
      echo 'Serviço de backup iniciado. Aguardando 02h00 da manhã...';
      while true; do
        HORA=$$(date +%H);
        MINUTO=$$(date +%M);
        
        # Roda todo dia exatamente às 02h00
        if [ \"$$HORA\" = \"02\" ] && [ \"$$MINUTO\" = \"00\" ]; then
          DATA=$$(date +%Y-%m-%d_%H-%M);
          echo \"[$$DATA] Iniciando backup automático...\";
          mkdir -p /app/media/backups;
          
          # 1. Extrai o banco usando ROOT e desabilitando tablespaces
          mysqldump -h speed_db -u root -p$$MYSQL_ROOT_PASSWORD --no-tablespaces $$MYSQL_DATABASE > /tmp/banco_$$DATA.sql;
          
          # 2. Compacta LOCALMENTE no Linux primeiro (Evita arquivo de 0 KB na rede)
          zip -r /tmp/backup_speed_$$DATA.zip /app/media /tmp/banco_$$DATA.sql > /dev/null;
          cp /tmp/backup_speed_$$DATA.zip /app/media/backups/backup_speed_$$DATA.zip;
          
          # 3. Copia o arquivo pronto para a pasta de homolog no Windows
          mkdir -p /mnt/windows/$$BACKUP_WINDOWS_SUBDIR;
          cp /tmp/backup_speed_$$DATA.zip /mnt/windows/$$BACKUP_WINDOWS_SUBDIR/;
          
          # 4. Limpa todo o lixo local do Linux
          rm /tmp/banco_$$DATA.sql /tmp/backup_speed_$$DATA.zip;
          
          # 5. Faxina: Apaga backups com mais de 10 dias da pasta de homolog
          find /mnt/windows/$$BACKUP_WINDOWS_SUBDIR -name 'backup_speed_*.zip' -mtime +10 -delete;
          find /app/media/backups -name 'backup_speed_*.zip' -mtime +10 -delete;
          
          echo \"[$$DATA] Backup finalizado e salvo no Windows com sucesso!\";
          sleep 60; # Dorme 1 minuto para não correr o risco de rodar duas vezes
        fi;
        sleep 30; # Checa a hora a cada 30 segundos
      done"

volumes:
  speed_db_data:
  
  backup_windows:
    driver_opts:
      type: cifs
      o: "username=${BACKUP_WINDOWS_USER},password=${BACKUP_WINDOWS_PASSWORD},domain=${BACKUP_WINDOWS_DOMAIN},vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777"
      device: "//${BACKUP_WINDOWS_HOST}/${BACKUP_WINDOWS_SHARE}"
