services:
  speed_db:
    image: mysql:8.0
    container_name: speed_mysql
    init: true
    restart: always
    environment:
      - TZ=America/Fortaleza
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3304:3306"
    volumes:
      - speed_db_data:/var/lib/mysql

  speed_web:
    build: .
    container_name: speed_sistema
    init: true
    restart: always
    ports:
      - "8091:8000"
    environment:
      - TZ=America/Fortaleza
      - TIME_ZONE=America/Fortaleza
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_STARTUP_TIMEOUT=${DB_STARTUP_TIMEOUT}
      - USE_AD_AUTH=${USE_AD_AUTH}
      - AD_SERVER_URI=${AD_SERVER_URI}
      - AD_BIND_DN=${AD_BIND_DN}
      - AD_BIND_PASSWORD=${AD_BIND_PASSWORD}
      - AD_USER_SEARCH_BASE=${AD_USER_SEARCH_BASE}
      - AD_GROUP_SEARCH_BASE=${AD_GROUP_SEARCH_BASE}
      - AD_DEFAULT_DOMAIN=${AD_DEFAULT_DOMAIN}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    extra_hosts:
      - "howbe.local:192.168.90.51"
    volumes:
      - ./media:/app/media
    command: >
      sh -c "mkdir -p /app/media &&
             chmod -R 777 /app/media &&
             python setup_speed.py &&
             gunicorn --bind 0.0.0.0:8000 --timeout 1200 --workers 3 --log-level debug --access-logfile - config.wsgi:application"
    depends_on:
      - speed_db

  speed_sincronizador:
    build: .
    container_name: speed_sincronizador_ixc
    init: true
    restart: always
    environment:
      - TZ=America/Fortaleza
      - TIME_ZONE=America/Fortaleza
      - USE_AD_AUTH=false
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    volumes:
      - ./media:/app/media
    depends_on:
      - speed_db
    command: >
      sh -c "
      echo ' Aguardando banco de dados estabilizar...';
      sleep 25;

      ULTIMO_SLOT_INCREMENTAL='0';
      ULTIMA_DATA_TOTAL='0';
      ULTIMA_DATA_OS_LASTMILE='0';
      ULTIMA_DATA_FAXINA='0';
      ULTIMO_SLOT_EMAIL_RESPOSTAS='0';

      while true; do
        HORA_AGORA=$$(date +%H);
        MINUTO_AGORA=$$(date +%M);
        DATA_HOJE=$$(date +%Y%m%d);
        SLOT_ATUAL=$$(date +%Y%m%d%H);

        if [ \"$$MINUTO_AGORA\" = \"00\" ] && [ \"$$SLOT_ATUAL\" != \"$$ULTIMO_SLOT_INCREMENTAL\" ]; then
          case \"$$HORA_AGORA\" in
            00|04|08|12|16|20)
              echo ' ['$$(date +%H:%M)'] Iniciando sincronizacao incremental programada (4h)...';
              python scripts/integracoes/ixc_api_incremental.py;
              ULTIMO_SLOT_INCREMENTAL=$$SLOT_ATUAL;
              ;;
          esac
        fi

        if [ \"$$HORA_AGORA\" = \"23\" ] && [ \"$$MINUTO_AGORA\" = \"00\" ] && [ \"$$DATA_HOJE\" != \"$$ULTIMA_DATA_TOTAL\" ]; then
          echo ' ['$$(date +%H:%M)'] Iniciando Carga Total Programada (23h)...';
          python scripts/integracoes/ixc_api.py;
          ULTIMA_DATA_TOTAL=$$DATA_HOJE;
        fi

        if [ \"$$HORA_AGORA\" = \"03\" ] && [ \"$$MINUTO_AGORA\" = \"00\" ] && [ \"$$DATA_HOJE\" != \"$$ULTIMA_DATA_OS_LASTMILE\" ]; then
          echo ' ['$$(date +%H:%M)'] Iniciando atualizacao diaria de OS Comercial | Lastmile (03h)...';
          python scripts/integracoes/ixc_os_comercial_lastmile.py --os-alterada-nos-ultimos-dias=10;
          ULTIMA_DATA_OS_LASTMILE=$$DATA_HOJE;
        fi

        if [ \"$$HORA_AGORA\" = \"22\" ] && [ \"$$MINUTO_AGORA\" = \"00\" ] && [ \"$$DATA_HOJE\" != \"$$ULTIMA_DATA_FAXINA\" ]; then
          echo ' ['$$(date +%H:%M)'] Iniciando Faxina Diaria (22h)...';
          python scripts/integracoes/ixc_faxina.py;
          ULTIMA_DATA_FAXINA=$$DATA_HOJE;
        fi

        if [ \"$$SLOT_ATUAL$${MINUTO_AGORA}\" != \"$$ULTIMO_SLOT_EMAIL_RESPOSTAS\" ]; then
          case \"$$MINUTO_AGORA\" in
            00|05|10|15|20|25|30|35|40|45|50|55)
              echo ' ['$$(date +%H:%M)'] Sincronizando respostas de e-mail das cotacoes...';
              python scripts/integracoes/sincronizar_respostas_email_cotacao.py;
              ULTIMO_SLOT_EMAIL_RESPOSTAS=$$SLOT_ATUAL$${MINUTO_AGORA};
              ;;
          esac
        fi

        echo ' Ciclo finalizado. Proxima verificacao em 1 minuto...';
        sleep 60;
      done"

  speed_backup:
    image: ubuntu:22.04
    container_name: speed_backup_diario
    profiles:
      - backup
    init: true
    restart: always
    depends_on:
      - speed_db
    environment:
      - TZ=America/Fortaleza
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - BACKUP_WINDOWS_SUBDIR=${BACKUP_WINDOWS_SUBDIR}
    volumes:
      - ./media:/app/media
      - backup_windows:/mnt/windows
    command: >
      sh -c "
      echo 'Configurando ferramentas de backup...';
      apt-get update && apt-get install -y mysql-client zip tzdata;

      echo 'Servico de backup iniciado. Aguardando 00h00...';
      while true; do
        HORA=$$(date +%H);
        MINUTO=$$(date +%M);

        if [ \"$$HORA\" = \"00\" ] && [ \"$$MINUTO\" = \"00\" ]; then
          DATA=$$(date +%Y-%m-%d_%H-%M);
          echo \"[$$DATA] Iniciando backup automatico...\";
          mkdir -p /app/media/backups;

          mysqldump -h speed_db -u root -p$$MYSQL_ROOT_PASSWORD --no-tablespaces $$MYSQL_DATABASE > /tmp/banco_$$DATA.sql;

          zip -r /tmp/backup_speed_$$DATA.zip /app/media /tmp/banco_$$DATA.sql > /dev/null;
          cp /tmp/backup_speed_$$DATA.zip /app/media/backups/backup_speed_$$DATA.zip;

          mkdir -p /mnt/windows/$$BACKUP_WINDOWS_SUBDIR;
          cp /tmp/backup_speed_$$DATA.zip /mnt/windows/$$BACKUP_WINDOWS_SUBDIR/;

          rm /tmp/banco_$$DATA.sql /tmp/backup_speed_$$DATA.zip;

          find /mnt/windows/$$BACKUP_WINDOWS_SUBDIR -name 'backup_speed_*.zip' -mtime +10 -delete;
          find /app/media/backups -name 'backup_speed_*.zip' -mtime +10 -delete;

          echo \"[$$DATA] Backup finalizado e salvo no Windows com sucesso!\";
          sleep 60;
        fi;
        sleep 30;
      done"

volumes:
  speed_db_data:

  backup_windows:
    driver_opts:
      type: cifs
      o: "username=${BACKUP_WINDOWS_USER},password=${BACKUP_WINDOWS_PASSWORD},domain=${BACKUP_WINDOWS_DOMAIN},vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777"
      device: "//${BACKUP_WINDOWS_HOST}/${BACKUP_WINDOWS_SHARE}"
