services:
  speed_db:
    image: mysql:8.0
    container_name: speed_mysql
    restart: always
    environment:
      MYSQL_DATABASE: speed_banco
      MYSQL_USER: speed_user
      MYSQL_PASSWORD: speed_password
      MYSQL_ROOT_PASSWORD: root_super_password
    ports:
      - "3309:3306"
    volumes:
      - speed_db_data:/var/lib/mysql

  speed_web:
    build: .
    container_name: speed_sistema
    restart: always
    ports:
      - "8003:8000"
    command: >
      sh -c "python setup_speed.py && 
             gunicorn --bind 0.0.0.0:8000 --timeout 120 --workers 3 config.wsgi:application"
    depends_on:
      - speed_db

  # =========================================================
  # 🤖 NOVO SERVIÇO: ROBÔ DE SINCRONIZAÇÃO DO IXC
  # =========================================================
  speed_sincronizador:
    build: .
    container_name: speed_sincronizador_ixc
    restart: always
    depends_on:
      - speed_db
    # O comando abaixo cria um loop: roda o script -> espera 20 min -> repete
    command: >
      sh -c "
      echo '🤖 Robô Sincronizador do IXC Iniciado...';
      while true; do
        echo '🔄 Iniciando sincronização incremental (D-0)...';
        python scripts/integracoes/ixc_api_incremental.py;
        echo '⏳ Sincronização finalizada. Aguardando 20 minutos (1200s)...';
        sleep 1200;
      done"

volumes:
  speed_db_data: