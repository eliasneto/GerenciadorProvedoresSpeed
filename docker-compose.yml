services:
  speed_db:
    image: mysql:8.0
    container_name: speed_mysql
    restart: always
    environment:
      MYSQL_DATABASE: speed_banco
      MYSQL_USER: speed_user
      MYSQL_PASSWORD: speed_password
      MYSQL_ROOT_PASSWORD: root_super_password
    ports:
      - "3303:3306"
    volumes:
      - speed_db_data:/var/lib/mysql

  speed_web:
    build: .
    container_name: speed_sistema
    restart: always
    ports:
      - "8090:8000"
    environment:
      - DB_NAME=speed_banco
      - DB_USER=speed_user
      - DB_PASSWORD=speed_password
      - DB_HOST=speed_db
      - DB_PORT=3306
      - USE_AD_AUTH=true
      - AD_SERVER_URI=ldap://192.168.90.51
      - AD_BIND_DN=servico.ti@howbe.local
      - AD_BIND_PASSWORD=HowB3@dm1n
      - AD_USER_SEARCH_BASE=DC=howbe,DC=local
      - AD_GROUP_SEARCH_BASE=DC=howbe,DC=local
      - AD_DEFAULT_DOMAIN=HOWBE
    extra_hosts:
      - "howbe.local:192.168.90.51"
    command: >
      sh -c "python setup_speed.py && 
             gunicorn --bind 0.0.0.0:8000 --timeout 120 --workers 3 --log-level debug --access-logfile - config.wsgi:application"
    depends_on:
      - speed_db

  speed_sincronizador:
    build: .
    container_name: speed_sincronizador_ixc
    restart: always
    environment:
      - USE_AD_AUTH=false
      - DB_NAME=speed_banco
      - DB_USER=speed_user
      - DB_PASSWORD=speed_password
      - DB_HOST=speed_db
      - DB_PORT=3306
    depends_on:
      - speed_db
    command: >
      sh -c "
      echo '🚀 Aguardando banco de dados estabilizar...';
      sleep 25;
      
      # Inicializa os marcadores (0 para rodar tudo na primeira vez)
      ULTIMA_TOTAL=0;
      ULTIMA_FAXINA=0;
      
      while true; do
        AGORA=$$(date +%s);
        
        # 1. INCREMENTAL
        echo '⚡ ['$$(date +%H:%M)'] Iniciando sincronização incremental...';
        python scripts/integracoes/ixc_api_incremental.py;

        # 2. CARGA TOTAL (Verifica se já passaram 4 horas - 14400 segundos)
        DIFERENCA_TOTAL=$$((AGORA - ULTIMA_TOTAL));
        if [ $$DIFERENCA_TOTAL -ge 360 ]; then
          echo '📦 ['$$(date +%H:%M)'] 4 horas se passaram. Iniciando Carga Total...';
          python scripts/integracoes/ixc_api.py;
          ULTIMA_TOTAL=$$(date +%s);
        fi

        # 3. FAXINA/LIXO (Verifica se já passaram 24 horas - 86400 segundos)
        DIFERENCA_FAXINA=$$((AGORA - ULTIMA_FAXINA));
        if [ $$DIFERENCA_FAXINA -ge 86400 ]; then
          echo '🧹 ['$$(date +%H:%M)'] 24 horas se passaram. Iniciando Faxina Diária...';
          python scripts/integracoes/ixc_faxina.py;
          ULTIMA_FAXINA=$$(date +%s);
        fi

        echo '😴 Ciclo finalizado. Próximo incremental em 5 minutos...';
        sleep 300;
      done"

volumes:
  speed_db_data: