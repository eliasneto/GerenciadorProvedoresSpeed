services:
  speed_db:
    image: mysql:8.0
    container_name: speed_mysql
    restart: always
    environment:
      MYSQL_DATABASE: speed_banco
      MYSQL_USER: speed_user
      MYSQL_PASSWORD: speed_password
      MYSQL_ROOT_PASSWORD: root_super_password
    ports:
      - "3303:3306"
    volumes:
      - speed_db_data:/var/lib/mysql

  speed_web:
    build: .
    container_name: speed_sistema
    restart: always
    ports:
      - "8003:8000"
    environment:
      # --- BANCO DE DADOS ---
      - DB_NAME=speed_banco
      - DB_USER=speed_user
      - DB_PASSWORD=speed_password
      - DB_HOST=speed_db
      - DB_PORT=3306
      # --- ACTIVE DIRECTORY (AD) ---
      - USE_AD_AUTH=true
      - AD_SERVER=ldap://seu-servidor-ad.local
      - AD_USER=usuario_leitura_ad@seu-dominio.com.br
      - AD_PASS=SenhaDoUsuario123
      - BASE_DN=DC=seu-dominio,DC=com,DC=br
      - AD_DOMAIN=seu-dominio.com.br
      # - GRUPO_PERMITIDO=CN=Usuarios-Speed,OU=Grupos,DC=seu-dominio,DC=com,DC=br
    command: >
      sh -c "python setup_speed.py && 
             gunicorn --bind 0.0.0.0:8000 --timeout 120 --workers 3 config.wsgi:application"
    depends_on:
      - speed_db

  # =========================================================
  #  NOVO SERVIÇO: ROBÔ DE SINCRONIZAÇÃO DO IXC
  # =========================================================
  speed_sincronizador:
    build: .
    container_name: speed_sincronizador_ixc
    restart: always
    environment:
      - USE_AD_AUTH=false
      - DB_NAME=speed_banco
      - DB_USER=speed_user
      - DB_PASSWORD=speed_password
      - DB_HOST=speed_db
      - DB_PORT=3306
    depends_on:
      - speed_db
    command: >
      sh -c "
      echo ' Aguardando banco de dados estabilizar...';
      sleep 20;
      echo ' Robô Sincronizador do IXC Iniciado...';
      while true; do
        echo ' Iniciando sincronização incremental (D-0)...';
        python scripts/integracoes/ixc_api_incremental.py;
        echo ' Sincronização finalizada. Aguardando 20 minutos...';
        sleep 300;
      done"

volumes:
  speed_db_data: