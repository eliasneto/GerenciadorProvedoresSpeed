{% extends "admin/base_site.html" %}
{% load static %}

{% block branding %}
<div id="site-name" style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
    <div style="display:flex; align-items:center; gap:12px; padding:8px 14px; border-radius:18px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);">
        <img src="{% static 'img/logo1.png' %}" alt="Logo 1" style="height:28px; width:auto; object-fit:contain;">
        <span style="width:1px; height:20px; background:rgba(255,255,255,0.14);"></span>
        <img src="{% static 'img/logo2.png' %}" alt="Logo 2" style="height:28px; width:auto; object-fit:contain;">
        <span style="width:1px; height:20px; background:rgba(255,255,255,0.14);"></span>
        <img src="{% static 'img/logo3.png' %}" alt="Logo 3" style="height:28px; width:auto; object-fit:contain;">
    </div>

    <a href="{% url 'admin:index' %}" style="color:#FFC107; font-weight:900; font-style:italic; font-size:20px; text-transform:uppercase; letter-spacing:0.08em; text-decoration:none;">
        Speed Engine
    </a>
</div>
{% endblock %}
