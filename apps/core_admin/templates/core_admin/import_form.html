{% extends "core/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto p-10">
    <div class="mb-10 flex flex-col items-center">
        <div class="w-20 h-20 bg-ageis-yellow rounded-[2rem] flex items-center justify-center shadow-2xl mb-6">
            <i data-lucide="database" class="text-black w-10 h-10"></i>
        </div>
        <h1 class="text-3xl font-black text-gray-900 uppercase italic text-center">Importador de Dados</h1>
        <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mt-2">Ageis Sistemas - Ferramenta Admin</p>
    </div>

    <div class="bg-white p-10 rounded-[3rem] border border-gray-100 shadow-sm space-y-8">
        <div class="p-6 bg-gray-50 rounded-3xl border border-dashed border-gray-200 text-center">
            <p class="text-sm text-gray-600 mb-4 font-medium">Ainda não tem a planilha padrão?</p>
            <a href="{% url 'download_template' %}" class="inline-flex items-center gap-2 text-xs font-black uppercase text-ageis-black hover:underline">
                <i data-lucide="download" class="w-4 h-4"></i> Baixar Planilha Modelo
            </a>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-gray-400 ml-2">Selecione o arquivo preenchido</label>
                <input type="file" name="file" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-ageis-yellow file:text-black">
            </div>

            <button type="submit" class="w-full bg-ageis-black text-ageis-yellow py-5 rounded-3xl font-black uppercase italic shadow-xl hover:bg-gray-800 transition-all flex items-center justify-center gap-3">
                <i data-lucide="play" class="w-5 h-5"></i> Iniciar Importação
            </button>
        </form>
    </div>
</div>
{% endblock %}
