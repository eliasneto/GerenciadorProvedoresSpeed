<script>
let quickProposalAllSelected = false;
let quickProposalClientSearchTimer = null;
let quickProposalAddressSearchTimer = null;
const quickProposalClientState = { page: 1, hasNext: true, loading: false, query: '', selectedClientId: null };
const quickProposalAddressState = { clienteId: null, page: 1, hasNext: true, loading: false, query: '', selectedIds: new Set() };

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function resetQuickProposalModal() {
    document.getElementById('quickProposalForm').reset();
    document.getElementById('quickProposalClientId').value = '';
    document.getElementById('quickProposalSelectedAddresses').innerHTML = '';
    document.getElementById('quickProposalClientSearch').value = '';
    document.getElementById('quickProposalClientResults').innerHTML = '<p class="text-xs text-gray-400 italic text-center py-10 font-bold">Carregando clientes cadastrados...</p>';
    document.getElementById('quickProposalAddressGrid').innerHTML = '<p class="text-xs text-gray-400 italic text-center py-24 font-bold">Selecione um cliente para carregar os logins.</p>';
    document.getElementById('quickProposalAddressSearch').value = '';
    document.getElementById('quickProposalAddressSearch').disabled = true;
    document.getElementById('quickProposalToggleAll').disabled = true;
    document.getElementById('quickProposalToggleAll').innerText = 'Selecionar Todos';
    document.getElementById('quickProposalSelectionSummary').innerText = 'Nenhum login selecionado.';
    document.getElementById('quickProposalSelectionBadge').classList.add('hidden');
    quickProposalAllSelected = false;
    Object.assign(quickProposalClientState, { page: 1, hasNext: true, loading: false, query: '', selectedClientId: null });
    Object.assign(quickProposalAddressState, { clienteId: null, page: 1, hasNext: true, loading: false, query: '', selectedIds: new Set() });
}

function openQuickProposalModal(pk, name, cnpj) {
    resetQuickProposalModal();
    document.getElementById('quickProposalForm').action = `/cotacao/${pk}/abrir-proposta/`;
    document.getElementById('quickProposalLeadName').innerText = name;
    document.getElementById('quickProposalLeadDoc').innerText = cnpj ? `CNPJ/CPF: ${cnpj}` : 'CNPJ/CPF nao informado';
    document.getElementById('quickProposalModal').classList.remove('hidden');
    document.getElementById('quickProposalModal').classList.add('flex');
    loadQuickProposalClients('', { reset: true });
}

function closeQuickProposalModal() {
    const modal = document.getElementById('quickProposalModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
}

function syncQuickProposalHiddenInputs() {
    document.getElementById('quickProposalSelectedAddresses').innerHTML = Array.from(quickProposalAddressState.selectedIds)
        .map(id => `<input type="hidden" name="enderecos_selecionados" value="${id}">`)
        .join('');
}

function updateQuickProposalSelectedClientVisual() {
    document.querySelectorAll('.quick-client-result').forEach(button => {
        const isSelected = button.dataset.id === String(quickProposalClientState.selectedClientId || '');
        button.classList.toggle('bg-yellow-50', isSelected);
        button.classList.toggle('border-ageis-yellow', isSelected);
        button.classList.toggle('ring-2', isSelected);
        button.classList.toggle('ring-ageis-yellow/60', isSelected);
    });
}

function renderQuickProposalClients(data, append = false) {
    const results = document.getElementById('quickProposalClientResults');
    if (!data.length) {
        if (!append) {
            results.innerHTML = '<p class="text-xs text-red-400 italic text-center py-10 font-bold">Nenhum cliente encontrado.</p>';
        }
        return;
    }

    const html = data.map(cliente => `
        <button type="button" data-id="${cliente.id}" class="quick-client-result group w-full text-left px-4 py-4 bg-white border border-gray-200 rounded-[1.15rem] hover:bg-yellow-50 hover:border-ageis-yellow transition shadow-sm">
            <div class="flex items-center gap-4">
                <span class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-gray-100 text-gray-500 text-[10px] font-black uppercase tracking-[0.16em]">CL</span>
                <div class="min-w-0 flex-1">
                    <p class="text-sm md:text-base font-black text-gray-900 leading-snug truncate">${escapeHtml(cliente.nome || '')}</p>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mt-1">${escapeHtml(cliente.documento || 'Sem documento')}</p>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300 group-hover:text-ageis-black transition flex-shrink-0"></i>
            </div>
        </button>
    `).join('');

    if (append) {
        results.insertAdjacentHTML('beforeend', html);
    } else {
        results.innerHTML = html;
    }

    if (window.lucide) window.lucide.createIcons();
    updateQuickProposalSelectedClientVisual();
}

async function loadQuickProposalClients(query = '', { reset = false } = {}) {
    const results = document.getElementById('quickProposalClientResults');
    if (quickProposalClientState.loading) return;
    if (reset) {
        quickProposalClientState.page = 1;
        quickProposalClientState.hasNext = true;
        quickProposalClientState.query = query;
        results.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-10 font-bold animate-pulse">Carregando clientes...</p>';
    }
    if (!quickProposalClientState.hasNext && !reset) return;

    quickProposalClientState.loading = true;
    try {
        const params = new URLSearchParams({ q: query, paginated: '1', page: String(quickProposalClientState.page), page_size: '20' });
        const response = await fetch(`/clientes/api/search/?${params.toString()}`);
        const data = await response.json();
        const resultsList = Array.isArray(data) ? data : (data.results || []);
        renderQuickProposalClients(resultsList, !reset);
        quickProposalClientState.hasNext = Boolean(data.has_next);
        quickProposalClientState.page = data.next_page || (quickProposalClientState.page + 1);
    } catch (error) {
        if (reset) {
            results.innerHTML = '<p class="text-xs text-red-500 italic text-center py-10 font-bold">Erro ao buscar clientes.</p>';
        }
    } finally {
        quickProposalClientState.loading = false;
    }
}

function updateQuickProposalSelectionState() {
    const selectedCount = quickProposalAddressState.selectedIds.size;
    const summary = document.getElementById('quickProposalSelectionSummary');
    const badge = document.getElementById('quickProposalSelectionBadge');
    const toggleAll = document.getElementById('quickProposalToggleAll');
    summary.innerText = selectedCount ? `${selectedCount} login(s) selecionado(s).` : 'Nenhum login selecionado.';
    if (selectedCount) {
        badge.classList.remove('hidden');
        badge.innerText = `${selectedCount} cotação(ões)`;
    } else {
        badge.classList.add('hidden');
        badge.innerText = '0 cotação(ões)';
    }
    const checkboxes = Array.from(document.querySelectorAll('.quick-proposal-address-item input[type="checkbox"]'));
    const allChecked = checkboxes.length > 0 && checkboxes.every(input => input.checked);
    quickProposalAllSelected = allChecked;
    toggleAll.innerText = allChecked ? 'Desmarcar Todos' : 'Selecionar Todos';
    syncQuickProposalHiddenInputs();
}

async function loadQuickProposalAddresses({ reset = false } = {}) {
    const grid = document.getElementById('quickProposalAddressGrid');
    if (!quickProposalAddressState.clienteId || quickProposalAddressState.loading) return;
    if (reset) {
        quickProposalAddressState.page = 1;
        quickProposalAddressState.hasNext = true;
        grid.innerHTML = '<p class="text-xs text-gray-400 italic text-center py-24 font-bold animate-pulse">Carregando logins...</p>';
    }
    if (!quickProposalAddressState.hasNext && !reset) return;

    quickProposalAddressState.loading = true;
    try {
        const params = new URLSearchParams({
            q: quickProposalAddressState.query,
            paginated: '1',
            page: String(quickProposalAddressState.page),
            page_size: '30',
        });
        const response = await fetch(`/clientes/api/addresses/${quickProposalAddressState.clienteId}/?${params.toString()}`);
        const data = await response.json();
        const resultsList = Array.isArray(data) ? data : (data.results || []);

        if (!resultsList.length && reset) {
            grid.innerHTML = '<p class="text-xs text-red-400 italic text-center py-24 font-bold">Nenhum login encontrado para este cliente.</p>';
        } else {
            const html = resultsList.map(item => {
                const checked = quickProposalAddressState.selectedIds.has(String(item.id));
                return `
                    <label class="quick-proposal-address-item flex items-center gap-4 px-4 py-4 border rounded-[1.15rem] transition cursor-pointer shadow-sm ${checked ? 'bg-yellow-50 border-ageis-yellow' : 'bg-white border-gray-200 hover:bg-gray-50'}" data-id="${item.id}">
                        <input type="checkbox" value="${item.id}" class="w-5 h-5 rounded border-gray-300 text-ageis-yellow focus:ring-ageis-yellow cursor-pointer flex-shrink-0" ${checked ? 'checked' : ''}>
                        <div class="min-w-0 flex-1 grid grid-cols-1 lg:grid-cols-[minmax(0,0.8fr)_minmax(0,1.4fr)_minmax(0,0.8fr)] gap-3 items-center">
                            <div class="min-w-0">
                                <p class="text-[10px] font-black uppercase tracking-[0.16em] text-blue-700 mb-1">Login</p>
                                <p class="text-xs md:text-sm font-black uppercase text-gray-900 tracking-wide truncate">${escapeHtml(item.login_ixc || '[Pendente/Nao Sincronizado]')}</p>
                            </div>
                            <div class="min-w-0">
                                <p class="text-[10px] font-black uppercase tracking-[0.16em] text-gray-400 mb-1">Endereco</p>
                                <p class="text-sm font-bold text-gray-800 truncate">${escapeHtml(item.endereco || 'Endereco nao informado')}</p>
                                <p class="text-xs font-semibold text-gray-500 mt-1 truncate">${escapeHtml(item.numero || 'S/N')}${item.bairro ? ` - ${escapeHtml(item.bairro)}` : ''}</p>
                            </div>
                            <div class="min-w-0">
                                <p class="text-[10px] font-black uppercase tracking-[0.16em] text-gray-400 mb-1">Cidade</p>
                                <p class="text-xs font-bold text-gray-700 truncate">${escapeHtml(item.cidade || 'Cidade nao informada')}</p>
                            </div>
                        </div>
                        <i data-lucide="map-pinned" class="w-4 h-4 text-gray-300 flex-shrink-0"></i>
                    </label>`;
            }).join('');
            if (reset) grid.innerHTML = html;
            else grid.insertAdjacentHTML('beforeend', html);
        }

        quickProposalAddressState.hasNext = Boolean(data.has_next);
        quickProposalAddressState.page = data.next_page || (quickProposalAddressState.page + 1);
        document.getElementById('quickProposalAddressSearch').disabled = false;
        document.getElementById('quickProposalToggleAll').disabled = false;
        if (window.lucide) window.lucide.createIcons();
        updateQuickProposalSelectionState();
    } catch (error) {
        if (reset) {
            grid.innerHTML = '<p class="text-xs text-red-500 italic text-center py-24 font-bold">Erro ao carregar logins do cliente.</p>';
        }
    } finally {
        quickProposalAddressState.loading = false;
    }
}

document.getElementById('quickProposalClientSearch').addEventListener('input', function() {
    const query = this.value.trim();
    if (query.length > 0 && query.length < 3) {
        document.getElementById('quickProposalClientResults').innerHTML = '<p class="text-xs text-gray-400 italic text-center py-10 font-bold">Digite pelo menos 3 caracteres para refinar a busca.</p>';
        return;
    }
    window.clearTimeout(quickProposalClientSearchTimer);
    quickProposalClientSearchTimer = window.setTimeout(() => loadQuickProposalClients(query, { reset: true }), 250);
});

document.getElementById('quickProposalClientResults').addEventListener('click', function(event) {
    const button = event.target.closest('.quick-client-result');
    if (!button) return;
    document.getElementById('quickProposalClientId').value = button.dataset.id;
    quickProposalClientState.selectedClientId = String(button.dataset.id);
    quickProposalAddressState.clienteId = String(button.dataset.id);
    quickProposalAddressState.page = 1;
    quickProposalAddressState.hasNext = true;
    quickProposalAddressState.query = '';
    quickProposalAddressState.selectedIds = new Set();
    updateQuickProposalSelectedClientVisual();
    updateQuickProposalSelectionState();
    loadQuickProposalAddresses({ reset: true });
});

document.getElementById('quickProposalClientResults').addEventListener('scroll', function() {
    if (this.scrollTop + this.clientHeight >= this.scrollHeight - 80) {
        loadQuickProposalClients(quickProposalClientState.query, { reset: false });
    }
});

document.getElementById('quickProposalAddressSearch').addEventListener('input', function() {
    const query = this.value.trim();
    window.clearTimeout(quickProposalAddressSearchTimer);
    quickProposalAddressSearchTimer = window.setTimeout(() => {
        quickProposalAddressState.query = query;
        loadQuickProposalAddresses({ reset: true });
    }, 250);
});

document.getElementById('quickProposalAddressGrid').addEventListener('change', function(event) {
    if (!event.target.matches('input[type="checkbox"]')) return;
    const value = String(event.target.value);
    if (event.target.checked) quickProposalAddressState.selectedIds.add(value);
    else quickProposalAddressState.selectedIds.delete(value);
    updateQuickProposalSelectionState();
});

document.getElementById('quickProposalAddressGrid').addEventListener('scroll', function() {
    if (this.scrollTop + this.clientHeight >= this.scrollHeight - 80) {
        loadQuickProposalAddresses({ reset: false });
    }
});

document.getElementById('quickProposalToggleAll').addEventListener('click', function() {
    quickProposalAllSelected = !quickProposalAllSelected;
    document.querySelectorAll('.quick-proposal-address-item input[type="checkbox"]').forEach(checkbox => {
        checkbox.checked = quickProposalAllSelected;
        const value = String(checkbox.value);
        if (quickProposalAllSelected) quickProposalAddressState.selectedIds.add(value);
        else quickProposalAddressState.selectedIds.delete(value);
    });
    updateQuickProposalSelectionState();
});

window.addEventListener('click', function(event) {
    const quickModal = document.getElementById('quickProposalModal');
    if (event.target === quickModal) closeQuickProposalModal();
});
</script>
