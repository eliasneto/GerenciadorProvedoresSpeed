{% extends "core/base.html" %}

{% block content %}
<div class="p-6 md:p-10">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-800">Painel Geral 👋</h1>
        <p class="text-gray-500 text-sm">Bem-vindo ao sistema de gerenciamento da <b>Speed/HowBe</b>.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="w-10 h-10 bg-yellow-100 text-yellow-600 rounded-lg flex items-center justify-center mb-4">
                <i data-lucide="handshake"></i>
            </div>
            <h3 class="text-gray-500 text-sm font-medium">Parceiros Ativos</h3>
            <p class="text-2xl font-bold">0</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center mb-4">
                <i data-lucide="truck"></i>
            </div>
            <h3 class="text-gray-500 text-sm font-medium">Fornecedores</h3>
            <p class="text-2xl font-bold">0</p>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="w-10 h-10 bg-green-100 text-green-600 rounded-lg flex items-center justify-center mb-4">
                <i data-lucide="trending-up"></i>
            </div>
            <h3 class="text-gray-500 text-sm font-medium">Prospecções</h3>
            <p class="text-2xl font-bold">0</p>
        </div>
    </div>
</div>
{% endblock %}
