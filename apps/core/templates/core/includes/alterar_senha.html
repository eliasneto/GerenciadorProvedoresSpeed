{% extends "core/base.html" %}

{% block content %}
<div class="w-full max-w-[500px] mx-auto mt-10">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-900 mb-2 italic uppercase">Segurança</h2>
        <p class="text-sm text-gray-400 mb-8">Atualize sua senha de acesso ao portal.</p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-700 uppercase">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" 
                           name="{{ field.name }}" 
                           required 
                           class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-ageis-yellow transition-all">
                    {% if field.errors %}
                        <p class="text-[10px] text-red-500 font-bold mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="w-full bg-ageis-yellow text-black font-black py-4 rounded-2xl shadow-lg hover:scale-[1.02] transition-all">
                CONFIRMAR NOVA SENHA
            </button>
            
            <a href="/" class="block text-center text-xs text-gray-400 hover:text-gray-600 transition-all mt-4">
                Cancelar e Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}
